server:
  port: 8080

spring:
  application:
    name: employee-app

  datasource:
    url: jdbc:postgresql://localhost:5432/employeedb
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: update

    show-sql: true

    properties:
      hibernate:
        format_sql: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

logging:
  level:
    org.springframework: INFO
