server:
  port: 8081

spring:
  application:
    name: employee-app

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/employeedb}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
